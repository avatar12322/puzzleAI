<div class="main">
    <div class="gallery-header">
        <h1 id="galleryTitle">Kolekcje Autorów</h1>
        <div class="header-actions">
            <div id="bulkActions" class="bulk-actions" style="display: none;">
                <button class="bulk-btn" onclick="downloadSelectedZip()" id="downloadSelectedBtn">💾 Pobierz zaznaczone (0)</button>
                <button class="bulk-btn secondary" onclick="downloadAllZip()">📦 Pobierz wszystko (ZIP)</button>
            </div>
            <button class="back-btn" id="backBtn" onclick="showFolders()">⬅ Wróć do folderów</button>
        </div>
    </div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-header">
            <span id="progressLabel">Generowanie...</span>
            <span id="progressCount">0/0</span>
        </div>
        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="statusText">Inicjalizacja...</div>
    </div>

    <div class="gallery" id="gallery">
        <!-- Foldery lub zdjęcia renderowane przez JS -->
    </div>
</div>
